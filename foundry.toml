[profile.default]
src = "contracts"
test = "test"
out = "contracts/out"
cache_path = "contracts/cache"
broadcast = "contracts/broadcast"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
